[tox]
# tox owns the Python-version matrix. Only contract tests live here — they
# run fast and benefit from being exercised on multiple interpreters. The
# e2e / limits / mcp tests live in noxfile.py instead; they want real Ollama
# (or a running API server) and don't benefit from a Python-version sweep.
envlist = py311, py312, py313, py314, py315
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run the API contract test suite (no LLM inference).
deps =
    httpx
commands =
    python -m unittest tests.test_api_contract -v
